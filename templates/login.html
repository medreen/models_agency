{% extends 'base.html' %} {% block title %} Create Model Account {% endblock %}
{% block content %}

<div class="container-form p-6" >    
<form action="/login" method="POST"> 
    <h4 class="text-2xl font-bold mb-6"><span class="logo-mark">Login</span> to Your Account</h4>    
    <div class="mb-6">
        <label for="email" class="block mb-2.5 text-sm font-medium text-heading">Email address</label>
        <input type="email" id="email" name="email" class="bg-neutral-secondary-medium border  text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="john.doe@company.com" required />
    </div> 
   <div class="mb-6">
      <div class="flex items-center justify-between mb-2.5">
        <label for="password" class="text-sm font-medium text-heading"
          >Password</label
        >
        <a href="/change_password" class="text-sm logo-tag hover:underline"
          >Forgot password?</a
        >
      </div>
      <input
        type="password"
        id="password"
        name="password"
        class="bg-neutral-secondary-medium border text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
        placeholder="•••••••••"
        required
      />
    </div> 
  

    <button type="submit" class="cta w-full">Submit</button>
</form>


</div>
{% endblock %}
