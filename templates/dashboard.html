{% extends 'base.html' %} {% block title %}
| Data & info
{% endblock %}
{% block content %}

<div>
    <h2>This is the dashboard page</h2>

<!-- Modal toggle -->
<button data-modal-target="job-modal" data-modal-toggle="job-modal" class="cta-dark absolute top-5.5 right-2.5" type="button">
  Add job
</button>

<!-- Main modal -->
<div id="job-modal" tabindex="-1" aria-hidden="true" class="container-form shadow-sm mt-2">
    <div class="relative w-full max-w-md max-h-full">
        <!-- Modal content -->

            <!-- Modal header -->
            <div class="absolute top-1.25 right-2.5">
                <button type="button" data-modal-hide="job-modal">
                    <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18 17.94 6M18 18 6.06 6"/></svg>
                    <span class="sr-only">Close modal</span>
                </button>
            </div>

            <!-- Modal body -->
            <form action="/add_job" method="POST">
                <div class="mb-6">
                    <label for="title" class="block mb-2.5 text-sm font-medium text-heading">Job Title</label>
                    <input type="text" name="title" id="title" class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Vogue Magazine" required>
                </div>

                <!-- Model / Job Type -->
                <div class="grid gap-6 mb-6 md:grid-cols-2">
                    <div>
                        <label for="assigned_model_id" class="block mb-2.5 text-sm font-medium text-heading">Model</label>
                        <select id="assigned_model_id" name="assigned_model_id" class="block w-full px-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body">
                            <option value="" selected>Select model</option>
                            {% for model in models %}
                            <option value="{{ model.id }}">{{ model[1] }} {{ model[2] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label for="job_type" class="block mb-2.5 text-sm font-medium text-heading">Job Type</label>
                        <input type="text" id="job_type" name="job_type" class="bg-neutral-secondary-medium border border-default-medium text-sm text-heading rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="" required>
                    </div>
                </div>

                <!-- Location / City / Country -->
                <div class="grid gap-6 mb-6 md:grid-cols-3">
                    <div>
                        <label for="location" class="block mb-2.5 text-sm font-medium text-heading">Location</label>
                        <input type="text" id="location" name="location" class="bg-neutral-secondary-medium border border-default-medium text-sm text-heading rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Studio address">
                    </div>
                    <div>
                        <label for="city" class="block mb-2.5 text-sm font-medium text-heading">City</label>
                        <input type="text" id="city" name="city" class="bg-neutral-secondary-medium border border-default-medium text-sm text-heading rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Nairobi">
                    </div>
                    <div>
                        <label for="country" class="block mb-2.5 text-sm font-medium text-heading">Country</label>
                        <input type="text" id="country" name="country" class="bg-neutral-secondary-medium border border-default-medium text-sm text-heading rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Kenya">
                    </div>
                </div>

                <!-- Start Date / End Date -->
                <div class="grid gap-6 mb-6 md:grid-cols-2">
                    <div>
                        <label for="start_date" class="block mb-2.5 text-sm font-medium text-heading">Start Date</label>
                        <input type="date" id="start_date" name="start_date" class="bg-neutral-secondary-medium border border-default-medium text-sm text-heading rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs">
                    </div>
                    <div>
                        <label for="end_date" class="block mb-2.5 text-sm font-medium text-heading">End Date</label>
                        <input type="date" id="end_date" name="end_date" class="bg-neutral-secondary-medium border border-default-medium text-sm text-heading rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs">
                    </div>
                </div>

                <!-- Start Time / End Time -->
                <div class="grid gap-6 mb-6 md:grid-cols-2">
                    <div>
                        <label for="start_time" class="block mb-2.5 text-sm font-medium text-heading">Start Time</label>
                        <input type="time" id="start_time" name="start_time" class="bg-neutral-secondary-medium border border-default-medium text-sm text-heading rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs">
                    </div>
                    <div>
                        <label for="end_time" class="block mb-2.5 text-sm font-medium text-heading">End Time</label>
                        <input type="time" id="end_time" name="end_time" class="bg-neutral-secondary-medium border border-default-medium text-sm text-heading rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs">
                    </div>
                </div>

                <!-- Rate per Hour / Currency -->
                <div class="grid gap-6 mb-6 md:grid-cols-2">
                    <div>
                        <label for="rate_per_hour" class="block mb-2.5 text-sm font-medium text-heading">Rate per Hour</label>
                        <input type="number" step="0.01" min="0" id="rate_per_hour" name="rate_per_hour" class="bg-neutral-secondary-medium border border-default-medium text-sm text-heading rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs" placeholder="0.00">
                    </div>
                    <div>
                        <label for="currency" class="block mb-2.5 text-sm font-medium text-heading">Currency</label>
                        <select id="currency" name="currency" class="block w-full px-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs">
                            <option value="KES" selected>KES</option>
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <option value="GBP">GBP</option>
                        </select>
                    </div>
                </div>

                <!-- Status / Is Paid -->
                <div class="grid gap-6 mb-6 md:grid-cols-2">
                    <div>
                        <label for="status" class="block mb-2.5 text-sm font-medium text-heading">Status</label>
                        <select id="status" name="status" class="block w-full px-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs">
                            <option value="pending" selected>Pending</option>
                            <option value="confirmed">Confirmed</option>
                            <option value="completed">Completed</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>
                    <div>
                        <label for="is_paid" class="block mb-2.5 text-sm font-medium text-heading">Is Paid</label>
                        <select id="is_paid" name="is_paid" class="block w-full px-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs">
                            <option value="false" selected>No</option>
                            <option value="true">Yes</option>
                        </select>
                    </div>
                </div>

                <!-- Gender Required / Category Required -->
                <div class="grid gap-6 mb-6 md:grid-cols-2">
                    <div>
                        <label for="gender_required" class="block mb-2.5 text-sm font-medium text-heading">Gender Required</label>
                        <select id="gender_required" name="gender_required" class="block w-full px-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs">
                            <option value="any" selected>Any</option>
                            <option value="female">Female</option>
                            <option value="male">Male</option>
                        </select>
                    </div>
                    <div>
                        <label for="category_required" class="block mb-2.5 text-sm font-medium text-heading">Category Required</label>
                        <input type="text" id="category_required" name="category_required" class="bg-neutral-secondary-medium border border-default-medium text-sm text-heading rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Runway, Editorial, Commercial...">
                    </div>
                </div>

                <!-- Min Height / Max Height -->
                <div class="grid gap-6 mb-6 md:grid-cols-2">
                    <div>
                        <label for="min_height_cm" class="block mb-2.5 text-sm font-medium text-heading">Min Height (cm)</label>
                        <input type="number" min="0" id="min_height_cm" name="min_height_cm" class="bg-neutral-secondary-medium border border-default-medium text-sm text-heading rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs" placeholder="e.g. 170">
                    </div>
                    <div>
                        <label for="max_height_cm" class="block mb-2.5 text-sm font-medium text-heading">Max Height (cm)</label>
                        <input type="number" min="0" id="max_height_cm" name="max_height_cm" class="bg-neutral-secondary-medium border border-default-medium text-sm text-heading rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs" placeholder="e.g. 185">
                    </div>
                </div>

                <!-- Description -->
                <div class="mb-6">
                    <label for="description" class="block mb-2.5 text-sm font-medium text-heading">Job Description</label>
                    <textarea id="description" name="description" rows="4" class="block bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand w-full p-3.5 shadow-xs placeholder:text-body" placeholder="Write product description here"></textarea>
                </div>

                <div class="flex items-start mt-6 mb-3">
                    <button type="submit" class="cta w-full">
                       send invite
                    </button>
                    <button data-modal-hide="job-modal" type="submit" class="button-decline w-full">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
