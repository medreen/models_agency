<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Model Management | {% block title %} {% endblock %}</title>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- css external -->
    <link rel="stylesheet" href="static/styles.css" />
  

    <link
      href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css"
      rel="stylesheet"
    />

    <!-- datatables -->
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.6/css/dataTables.bulma.min.css"
    />
  </head>
  <body>
    
<header>
  <nav class="nav">
  <div class="nav-inner">
    <a href="/" class="logo">
      <span class="logo-mark">Model</span>
      <span class="logo-tag">Connect</span>
    </a>
 
    <div class="desktop-only">
      <ul class="nav-links">
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/models">Models</a></li>
        <li><a href="/agency">Agencies</a></li>
        <li><a href="/collaborations">Collaborations</a></li>
        <li><a href="/register_agency">Are you an Agency?</a></li>
              
      </ul>
      
      <a href="/register_model" class="cta">Create Model Account</a>
      <a href="/login" class="cta">Login</a>
    </div>
 
    <button class="toggle" id="toggle" aria-label="Open menu" aria-controls="mobile-panel" aria-expanded="false">
      <svg id="icon-open" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5" />
      </svg>
      <svg id="icon-close" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" style="display:none;">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
</header>   

    <main>{% block content %}{% endblock %}</main>


    <script
      src="https://kit.fontawesome.com/your-font-awesome-kit.js"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>

      
<script>
  const toggle = document.getElementById('toggle');
  const panel = document.getElementById('mobile-panel');
  const iconOpen = document.getElementById('icon-open');
  const iconClose = document.getElementById('icon-close');
 
  toggle.addEventListener('click', () => {
    const isOpen = panel.classList.toggle('open');
    toggle.setAttribute('aria-expanded', isOpen);
    iconOpen.style.display = isOpen ? 'none' : 'block';
    iconClose.style.display = isOpen ? 'block' : 'none';
  });
</script>
 <footer class="footer md:p-6">
    <span class="text-sm text-body sm:text-center">© 2026 <a href="https://flowbite.com/" class="hover:underline">Flowbite™</a>. All Rights Reserved.
    </span>
   
</footer>
  </body>
</html>
